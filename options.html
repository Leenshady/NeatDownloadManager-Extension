<!DOCTYPE html>
<html>
<head>
    <title>NeatDownloadManager Extension Options</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 20px;
        }
        #blocked-list {
            list-style-type: none;
            padding: 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #blocked-list li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #blocked-list li:last-child {
            border-bottom: none;
        }
        .remove-btn {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .remove-btn:hover {
            background-color: #cc0000;
        }
        .empty-message {
            padding: 20px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Blocked Websites</h1>
    <div style="margin-bottom: 20px; display: flex; gap: 10px;">
        <input type="text" id="new-host" placeholder="example.com" style="flex-grow: 1; padding: 5px;">
        <button id="add-btn" class="remove-btn" style="background-color: #4CAF50;">Add</button>
    </div>
    <p>The following websites are blocked from NeatDownloadManager:</p>
    <ul id="blocked-list"></ul>
    <script src="options.js"></script>
</body>
</html>
